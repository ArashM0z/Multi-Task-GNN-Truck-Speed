# Additive pyproject for the paper extensions package.
# Use alongside the upstream AST-MTL setup.

[project]
name = "truck-speed-extensions"
version = "1.0.0"
description = "SIGSPATIAL 2022 paper extensions on top of AST-MTL"
requires-python = ">=3.10"
dependencies = [
    "torch>=2.0",
    "xarray>=2023.0",
    "netcdf4>=1.6",
    "numpy>=1.24",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.5", "mypy>=1.10"]
